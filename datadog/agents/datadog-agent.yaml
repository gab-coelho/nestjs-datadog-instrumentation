apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: datadog
spec:
  global:
    site: datadoghq.com
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
  features:
    apm:
      enabled: true
      hostPortConfig:
        enabled: true
      instrumentation:
        enabled: true
        enabledNamespaces:
          - nestjs-auto
        libVersions:
          js: latest
    admissionController:
      enabled: true
