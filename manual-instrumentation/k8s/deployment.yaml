apiVersion: apps/v1
kind: Deployment
metadata:
  name: nestjs-manual
  namespace: nestjs-manual
  labels:
    app.kubernetes.io/name: nestjs-manual
    app.kubernetes.io/part-of: datadog-instrumentation-lab
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/service: nestjs-manual
    tags.datadoghq.com/version: "0.0.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nestjs-manual
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nestjs-manual
        app.kubernetes.io/part-of: datadog-instrumentation-lab
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/service: nestjs-manual
        tags.datadoghq.com/version: "0.0.1"
    spec:
      containers:
        - name: app
          image: localhost:5001/nestjs-dd-manual:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: nestjs-manual-config
          env:
            - name: DD_TRACE_AGENT_URL
              value: http://datadog-agent.datadog.svc.cluster.local:8126
            - name: DD_ENV
              value: dev
            - name: DD_SERVICE
              value: nestjs-manual
            - name: DD_VERSION
              value: "0.0.1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 120m
              memory: 162Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
